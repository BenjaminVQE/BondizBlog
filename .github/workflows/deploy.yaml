name: Deploy to VPS

on:
  workflow_run:
    workflows: ["Build Image and Push Registry"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_IP: ${{ secrets.VPS_IP }}
      REGISTRY_NAME: ${{ secrets.REGISTRY_NAME }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Setup SSH for VPS
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $VPS_IP >> ~/.ssh/known_hosts
          cat ~/.ssh/known_hosts

      - name: SSH into VPS and deploy
        run: |
          ssh -t $VPS_USER@$VPS_IP << 'EOF'
            echo "Go to directory bondiz-blog"
            cd /home/ubuntu/bondiz-blog/
            
            echo "Stop container if exist"
            docker stop bondiz-blog-container || true
            
            echo "Remove container if exist"
            docker rm bondiz-blog-container || true
            
            echo "Run container"
            ls -lah
            docker compose up -d
          EOF
