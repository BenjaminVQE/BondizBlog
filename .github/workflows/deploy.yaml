name: Deploy to VPS

on:
  workflow_run:
    workflows: ["Build Image and Push Registry"]
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH for VPS
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_IP }} >> ~/.ssh/known_hosts

      - name: Prepare directory on VPS
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} "mkdir -p /home/debian/bondiz-blog"

      - name: Copy docker-compose.prod.yaml to VPS
        run: |
          scp docker-compose.prod.yaml ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }}:/home/debian/bondiz-blog/docker-compose.prod.yaml

      - name: SSH into VPS and deploy
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_IP }} \
            "export REGISTRY_NAME='${{ secrets.REGISTRY_NAME }}' && \
             export REGISTRY_USERNAME='${{ secrets.REGISTRY_USERNAME }}' && \
             export REGISTRY_PASSWORD='${{ secrets.REGISTRY_PASSWORD }}' && \
             export MYSQL_ROOT_PASSWORD='${{ secrets.MYSQL_ROOT_PASSWORD }}' && \
             export MYSQL_DATABASE='${{ secrets.MYSQL_DATABASE }}' && \
             export MYSQL_USER='${{ secrets.MYSQL_USER }}' && \
             export MYSQL_PASSWORD='${{ secrets.MYSQL_PASSWORD }}' && \
             /bin/bash -s" << 'EOF'
            set -e
            echo "Go to directory bondiz-blog"
            cd /home/debian/bondiz-blog/
            
            echo "Login to registry"
            echo "$REGISTRY_PASSWORD" | docker login "$REGISTRY_NAME" -u "$REGISTRY_USERNAME" --password-stdin

            echo "Pulling latest images"
            docker compose -f docker-compose.prod.yaml pull
            
            echo "Running container"
            docker compose -f docker-compose.prod.yaml up -d --remove-orphans
            
            echo "Cleaning up old images"
            docker image prune -f
          EOF
